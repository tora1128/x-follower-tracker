services:
  - type: web
    name: x-follower-tracker
    runtime: python
    plan: free
    region: singapore
    buildCommand: "true"
    startCommand: "python3 web_app.py"
    healthCheckPath: /health
    envVars:
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_USER_ID
        sync: false
      - key: X_USERNAME
        sync: false
      - key: WEB_APP_KEY
        sync: false
      - key: XFT_STORAGE_DIR
        value: /tmp/x-follower-tracker
