services:
  - type: web
    name: x-follower-tracker
    runtime: python
    plan: free
    region: singapore
    buildCommand: "true"
    startCommand: "python3 web_app.py"
    healthCheckPath: /health
    envVars:
      - key: PUBLIC_MODE
        value: "true"
      - key: SITE_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: XFT_STORAGE_DIR
        value: /tmp/x-follower-tracker
